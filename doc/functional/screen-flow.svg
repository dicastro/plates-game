<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" role="img">
<title>PLATES — screen navigation flow</title>
<desc>Full state machine showing all screens and transitions: Splash, Home, Normal mode, Friends Hub, Travel mode, Remote mode, Leaderboard, and persistent overlays.</desc>

<style>
  text { font-family: system-ui, -apple-system, sans-serif; fill: #1e293b; }
  .th  { font-size: 14px; font-weight: 600; }
  .ts  { font-size: 12px; font-weight: 400; fill: #475569; }
  .arr { stroke: #94a3b8; stroke-width: 1.5; fill: none; }
  .ret { stroke: #94a3b8; stroke-width: 1; fill: none; stroke-dasharray: 5 3; }
  .box-gray    { fill: #f1f5f9; stroke: #94a3b8; }
  .box-purple  { fill: #ede9fe; stroke: #7c3aed; }
  .box-teal    { fill: #ccfbf1; stroke: #0d9488; }
  .box-coral   { fill: #fee2e2; stroke: #dc2626; }
  .box-blue    { fill: #dbeafe; stroke: #2563eb; }
  .text-purple { fill: #4c1d95; }
  .text-teal   { fill: #134e4a; }
  .text-coral  { fill: #7f1d1d; }
  .text-blue   { fill: #1e3a8a; }
  .text-gray   { fill: #1e293b; }
  .lbl         { font-size: 11px; fill: #64748b; }
  .zone        { fill: none; stroke-dasharray: 5 4; stroke-width: 1; rx: 10; }
</style>

<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="ret" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#94a3b8" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- ─────────────────────────────────────────────
     ZONE BACKGROUNDS
     ───────────────────────────────────────────── -->

<!-- Normal zone -->
<rect x="42" y="200" width="200" height="186" rx="10" class="zone" stroke="#0d9488"/>
<text class="lbl" x="54" y="218" fill="#0d9488">Normal mode</text>

<!-- Friends zone -->
<rect x="272" y="200" width="136" height="74" rx="10" class="zone" stroke="#7c3aed"/>
<text class="lbl" x="284" y="218" fill="#7c3aed">Friends hub</text>

<!-- Travel zone -->
<rect x="330" y="306" width="168" height="496" rx="10" class="zone" stroke="#dc2626"/>
<text class="lbl" x="342" y="324" fill="#dc2626">Travel mode</text>

<!-- Remote zone -->
<rect x="516" y="306" width="140" height="402" rx="10" class="zone" stroke="#2563eb"/>
<text class="lbl" x="528" y="324" fill="#2563eb">Remote mode</text>

<!-- ─────────────────────────────────────────────
     PERSISTENT HUD CALLOUT
     ───────────────────────────────────────────── -->
<rect x="14" y="82" width="176" height="64" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
<text class="th text-gray" x="102" y="100" text-anchor="middle">Persistent HUD</text>
<text class="ts" x="26" y="118">🔇  Mute toggle</text>
<text class="ts" x="26" y="134">⚙️  Settings · 🔔  What's New</text>
<text class="lbl" x="102" y="152" text-anchor="middle">visible on all screens except Splash</text>

<!-- ─────────────────────────────────────────────
     SPLASH
     ───────────────────────────────────────────── -->
<rect x="270" y="20" width="140" height="40" rx="8" class="box-gray" stroke-width="1"/>
<text class="th text-gray" x="340" y="36" text-anchor="middle" dominant-baseline="central">Splash</text>
<text class="ts" x="340" y="52" text-anchor="middle" dominant-baseline="central">SDK init · theme · archive-on-launch</text>

<!-- Splash → Home -->
<line x1="340" y1="60" x2="340" y2="94" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     HOME
     ───────────────────────────────────────────── -->
<rect x="258" y="98" width="164" height="44" rx="8" class="box-purple" stroke-width="1"/>
<text class="th text-purple" x="340" y="116" text-anchor="middle" dominant-baseline="central">Home</text>
<text class="ts text-purple" x="340" y="132" text-anchor="middle" dominant-baseline="central">Mode selection</text>

<!-- Home → Normal Game -->
<path d="M290 142 L142 222" class="arr" marker-end="url(#arr)" fill="none"/>

<!-- Home → Friends Hub -->
<path d="M390 142 L390 222" class="arr" marker-end="url(#arr)" fill="none"/>

<!-- Home → Leaderboard -->
<path d="M340 142 L340 180 L200 180 L200 222" class="arr" marker-end="url(#arr)" fill="none"/>

<!-- ─────────────────────────────────────────────
     LEADERBOARD
     ───────────────────────────────────────────── -->
<rect x="118" y="226" width="142" height="40" rx="8" class="box-gray" stroke-width="1"/>
<text class="th text-gray" x="189" y="242" text-anchor="middle" dominant-baseline="central">Leaderboard</text>
<text class="ts" x="189" y="258" text-anchor="middle" dominant-baseline="central">YouTube native</text>

<!-- Leaderboard → Home (return) -->
<path d="M118 246 L96 246 L96 120 L256 120" class="ret" marker-end="url(#ret)" fill="none"/>

<!-- ─────────────────────────────────────────────
     NORMAL GAME
     ───────────────────────────────────────────── -->
<rect x="56" y="226" width="134" height="40" rx="8" class="box-teal" stroke-width="1"/>
<text class="th text-teal" x="123" y="242" text-anchor="middle" dominant-baseline="central">Normal game</text>
<text class="ts text-teal" x="123" y="258" text-anchor="middle" dominant-baseline="central">Daily puzzle · 5 attempts</text>

<!-- Normal Game → Normal Result -->
<line x1="123" y1="266" x2="123" y2="308" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     NORMAL RESULT
     ───────────────────────────────────────────── -->
<rect x="56" y="312" width="134" height="40" rx="8" class="box-teal" stroke-width="1"/>
<text class="th text-teal" x="123" y="328" text-anchor="middle" dominant-baseline="central">Normal result</text>
<text class="ts text-teal" x="123" y="344" text-anchor="middle" dominant-baseline="central">Score · bonus · CTA</text>

<!-- Normal Result → Home (return) -->
<path d="M56 332 L36 332 L36 120 L256 120" class="ret" marker-end="url(#ret)" fill="none"/>

<!-- Normal Result → Leaderboard -->
<path d="M190 332 L218 246" class="ret" marker-end="url(#ret)" fill="none"/>
<text class="lbl" x="216" y="300" text-anchor="middle">ranking</text>

<!-- ─────────────────────────────────────────────
     FRIENDS HUB
     ───────────────────────────────────────────── -->
<rect x="306" y="226" width="168" height="40" rx="8" class="box-purple" stroke-width="1"/>
<text class="th text-purple" x="390" y="242" text-anchor="middle" dominant-baseline="central">Friends hub</text>
<text class="ts text-purple" x="390" y="258" text-anchor="middle" dominant-baseline="central">Active &amp; archived sessions</text>

<!-- Friends Hub → Travel Lobby -->
<path d="M366 266 L414 328" class="arr" marker-end="url(#arr)" fill="none"/>

<!-- Friends Hub → Remote Lobby -->
<path d="M458 266 L548 328" class="arr" marker-end="url(#arr)" fill="none"/>

<!-- ─────────────────────────────────────────────
     TRAVEL LOBBY
     ───────────────────────────────────────────── -->
<rect x="346" y="332" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="348" text-anchor="middle" dominant-baseline="central">Travel lobby</text>
<text class="ts text-coral" x="415" y="364" text-anchor="middle" dominant-baseline="central">Create or join</text>

<!-- Travel Lobby → Travel Config -->
<line x1="415" y1="372" x2="415" y2="406" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     TRAVEL CONFIG
     ───────────────────────────────────────────── -->
<rect x="346" y="410" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="426" text-anchor="middle" dominant-baseline="central">Travel config</text>
<text class="ts text-coral" x="415" y="442" text-anchor="middle" dominant-baseline="central">Rounds · consonants</text>

<!-- Travel Config → Travel Waiting -->
<line x1="415" y1="450" x2="415" y2="484" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     TRAVEL WAITING
     ───────────────────────────────────────────── -->
<rect x="346" y="488" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="504" text-anchor="middle" dominant-baseline="central">Travel waiting</text>
<text class="ts text-coral" x="415" y="520" text-anchor="middle" dominant-baseline="central">Room code · share</text>

<!-- Travel Waiting → Travel Game -->
<line x1="415" y1="528" x2="415" y2="562" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     TRAVEL GAME
     ───────────────────────────────────────────── -->
<rect x="346" y="566" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="582" text-anchor="middle" dominant-baseline="central">Travel game</text>
<text class="ts text-coral" x="415" y="598" text-anchor="middle" dominant-baseline="central">60 s timer · 1 attempt</text>

<!-- Travel Game → Travel Result -->
<line x1="415" y1="606" x2="415" y2="640" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     TRAVEL RESULT
     ───────────────────────────────────────────── -->
<rect x="346" y="644" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="660" text-anchor="middle" dominant-baseline="central">Travel result</text>
<text class="ts text-coral" x="415" y="676" text-anchor="middle" dominant-baseline="central">Round score · live ranking</text>

<!-- Travel Result → Travel Game (next round loop) -->
<path d="M346 664 L318 664 L318 586 L346 586" class="ret" marker-end="url(#ret)" fill="none"/>
<text class="lbl" x="308" y="630" text-anchor="middle" transform="rotate(-90,308,630)">next round</text>

<!-- Travel Result → Travel Final -->
<line x1="415" y1="684" x2="415" y2="718" class="arr" marker-end="url(#arr)"/>
<text class="lbl" x="432" y="706">session end</text>

<!-- ─────────────────────────────────────────────
     TRAVEL FINAL
     ───────────────────────────────────────────── -->
<rect x="346" y="722" width="138" height="40" rx="8" class="box-coral" stroke-width="1"/>
<text class="th text-coral" x="415" y="738" text-anchor="middle" dominant-baseline="central">Travel final</text>
<text class="ts text-coral" x="415" y="754" text-anchor="middle" dominant-baseline="central">Session podium</text>

<!-- Travel Final → Friends Hub (return) -->
<path d="M346 742 L282 742 L282 246 L306 246" class="ret" marker-end="url(#ret)" fill="none"/>

<!-- ─────────────────────────────────────────────
     REMOTE LOBBY
     ───────────────────────────────────────────── -->
<rect x="528" y="332" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="348" text-anchor="middle" dominant-baseline="central">Remote lobby</text>
<text class="ts text-blue" x="587" y="364" text-anchor="middle" dominant-baseline="central">Create or join</text>

<!-- Remote Lobby → Remote Config -->
<line x1="587" y1="372" x2="587" y2="406" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     REMOTE CONFIG
     ───────────────────────────────────────────── -->
<rect x="528" y="410" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="426" text-anchor="middle" dominant-baseline="central">Remote config</text>
<text class="ts text-blue" x="587" y="442" text-anchor="middle" dominant-baseline="central">Time window</text>

<!-- Remote Config → Remote Waiting -->
<line x1="587" y1="450" x2="587" y2="484" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     REMOTE WAITING
     ───────────────────────────────────────────── -->
<rect x="528" y="488" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="504" text-anchor="middle" dominant-baseline="central">Remote waiting</text>
<text class="ts text-blue" x="587" y="520" text-anchor="middle" dominant-baseline="central">Share · participants</text>

<!-- Remote Waiting → Remote Game -->
<line x1="587" y1="528" x2="587" y2="562" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     REMOTE GAME
     ───────────────────────────────────────────── -->
<rect x="528" y="566" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="582" text-anchor="middle" dominant-baseline="central">Remote game</text>
<text class="ts text-blue" x="587" y="598" text-anchor="middle" dominant-baseline="central">Blind · 1 attempt</text>

<!-- Remote Game → Remote Result -->
<line x1="587" y1="606" x2="587" y2="640" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     REMOTE RESULT
     ───────────────────────────────────────────── -->
<rect x="528" y="644" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="660" text-anchor="middle" dominant-baseline="central">Remote result</text>
<text class="ts text-blue" x="587" y="676" text-anchor="middle" dominant-baseline="central">Own word · blind</text>

<!-- Remote Result → Remote Final -->
<line x1="587" y1="684" x2="587" y2="718" class="arr" marker-end="url(#arr)"/>

<!-- ─────────────────────────────────────────────
     REMOTE FINAL
     ───────────────────────────────────────────── -->
<rect x="528" y="722" width="118" height="40" rx="8" class="box-blue" stroke-width="1"/>
<text class="th text-blue" x="587" y="738" text-anchor="middle" dominant-baseline="central">Remote final</text>
<text class="ts text-blue" x="587" y="754" text-anchor="middle" dominant-baseline="central">Revealed ranking</text>

<!-- Remote Final → Friends Hub (return) -->
<path d="M528 742 L474 742 L474 266 L474 246" class="ret" marker-end="url(#ret)" fill="none"/>

<!-- ─────────────────────────────────────────────
     ABANDON → HOME (any game screen)
     ───────────────────────────────────────────── -->
<path d="M660 586 L672 586 L672 120 L424 120" class="ret" marker-end="url(#ret)" fill="none"/>
<text class="lbl" x="672" y="430" text-anchor="middle" transform="rotate(90,672,430)">abandon → home (any game screen)</text>

<!-- ─────────────────────────────────────────────
     OVERLAYS CALLOUT
     ───────────────────────────────────────────── -->
<rect x="14" y="810" width="200" height="72" rx="8" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
<text class="th text-gray" x="114" y="828" text-anchor="middle">Overlays (stack on any screen)</text>
<text class="ts" x="26" y="848">⚙️  Settings — audio · language</text>
<text class="ts" x="26" y="864">🔔  What's New — release notes</text>
<text class="lbl" x="114" y="880" text-anchor="middle">underlying screen stays mounted</text>

<!-- ─────────────────────────────────────────────
     LEGEND
     ───────────────────────────────────────────── -->
<line x1="240" y1="840" x2="268" y2="840" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="lbl" x="274" y="844">Primary flow</text>

<line x1="240" y1="862" x2="268" y2="862" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#ret)"/>
<text class="lbl" x="274" y="866">Return / optional</text>

<rect x="380" y="832" width="12" height="12" rx="2" class="box-teal" stroke-width="1"/>
<text class="lbl" x="398" y="842">Normal</text>
<rect x="380" y="854" width="12" height="12" rx="2" class="box-coral" stroke-width="1"/>
<text class="lbl" x="398" y="864">Travel</text>
<rect x="450" y="832" width="12" height="12" rx="2" class="box-blue" stroke-width="1"/>
<text class="lbl" x="468" y="842">Remote</text>
<rect x="450" y="854" width="12" height="12" rx="2" class="box-purple" stroke-width="1"/>
<text class="lbl" x="468" y="864">Hub / Home</text>
<rect x="530" y="832" width="12" height="12" rx="2" class="box-gray" stroke-width="1"/>
<text class="lbl" x="548" y="842">Neutral</text>

</svg>